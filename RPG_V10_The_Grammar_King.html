body{margin:0;font-family:Arial,'Microsoft JhengHei';color:#fff;text-align:center;background:#102a43;background-size:cover;background-position:center;transition:.8s}#app{max-width:1120px;margin:18px auto;padding:22px;border-radius:28px;background:rgba(0,0,0,.68);box-shadow:0 0 30px #000}h1{font-size:36px}.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.card{background:rgba(255,255,255,.12);border-radius:18px;padding:12px}button{border:0;border-radius:14px;padding:11px 18px;margin:6px;font-size:16px;cursor:pointer}.main{background:#ffd43b}.ans{display:block;width:92%;margin:8px auto;background:white;color:#111}.ans.hide{visibility:hidden}.bar{height:22px;border:2px solid #fff;border-radius:18px;background:#222;overflow:hidden}.fill{height:100%;transition:.25s}.hp{background:#fa5252}.mp{background:#4dabf7}.xp{background:#ffd43b}.boss{background:#845ef7}#monster{font-size:86px}.shop button{background:#40c057;color:white}.skill button{background:#f76707;color:white}.equip button{background:#339af0;color:white}.badge{display:inline-block;background:rgba(255,255,255,.18);border-radius:12px;padding:6px 10px;margin:3px}.boom{animation:boom .45s}@keyframes boom{50%{transform:scale(1.35);filter:drop-shadow(0 0 25px orange)}}#q{font-size:24px;min-height:80px;display:flex;justify-content:center;align-items:center;line-height:1.35}.small{opacity:.88}
</style></head><body><div id="app"><h1>👑 RPG V11 Ultimate Fusion Fixed 👑</h1><div class="small">修正版：刪除假題，只保留正常 Vocabulary / Grammar / Reading 題</div><h2 id="info"></h2><div class="grid"><div class="card">❤️ HP<div class="bar"><div id="hpbar" class="fill hp"></div></div></div><div class="card">🔮 MP<div class="bar"><div id="mpbar" class="fill mp"></div></div></div><div class="card">⭐ EXP<div class="bar"><div id="xpbar" class="fill xp"></div></div></div></div><h3>🐉 Boss HP</h3><div class="bar"><div id="bossbar" class="fill boss"></div></div><div id="monster">👾</div><h2 id="bossName"></h2><h2 id="q">Press Start</h2><div id="answers"></div><button class="main" onclick="nextQ()">⚔️ Start / Next Question</button><h3>💣 Skills</h3><div class="skill"><button onclick="bomb()">💣 Bomb</button><button onclick="hint()">🎯 Hint</button><button onclick="healSpell()">✨ Heal Spell</button><button onclick="treasure()">🎁 Treasure</button></div><h3>🛒 Shop</h3><div class="shop"><button onclick="buy('hp')">❤️ Heal 25G</button><button onclick="buy('bomb')">💣 Bomb 35G</button><button onclick="buy('hint')">🎯 Hint 45G</button><button onclick="buy('mp')">🔮 MP 30G</button></div><h3>⚔️ Equipment</h3><div class="equip"><button onclick="equip('Iron Sword',60,12)">Iron Sword 60G</button><button onclick="equip('Dragon Sword',160,35)">Dragon Sword 160G</button><button onclick="equip('Legendary Sword',350,80)">Legendary Sword 350G</button><button onclick="equip('Grammar Crown',500,120)">Grammar Crown 500G</button></div><h3>🏆 Achievements</h3><div id="ach"></div><button onclick="save()">💾 Save</button><button onclick="load()">📂 Load</button><button onclick="resetGame()">🗑️ Reset</button><p id="msg">Welcome, Legendary Hero!</p></div>
<script>
const VOCAB=[['attention','注意力','Please pay attention to the question.'],['public art','公共藝術','Public art can make a community beautiful.'],['community','社區','Our community has a small park.'],['mural','壁畫','The mural shows colorful birds.'],['ordinary','普通的','It was an ordinary school day.'],['inspire','啟發','Her story can inspire many students.'],['graffiti','塗鴉','Graffiti became popular in cities.'],['message','訊息、理念','The artist message is about nature.'],['canvas','畫布','The painter used a big canvas.'],['creative','有創意的','The creative student made a new game.'],['donate','捐贈','People donate old bikes.'],['volunteer','志工','A volunteer repaired the bike.'],['repair','修理','They repair old bicycles.'],['helmet','安全帽','Children wear helmets when riding.'],['safe','安全的','Bike lessons help children stay safe.'],['problem','問題','Old bikes can become a problem.'],['solution','解決方法','Donation is a good solution.'],['accidental','意外的','The Popsicle was an accidental invention.'],['invention','發明','The Slinky is an invention.'],['invent','發明','People invent tools to solve problems.'],['adhesive','黏著劑','The adhesive was weak but reusable.'],['reuse','再利用','We can reuse old boxes.'],['mistake','錯誤','The mistake became a useful idea.'],['experiment','實驗','Scientists experiment with materials.'],['celebrate','慶祝','People celebrate with fireworks.'],['cause','原因；公益議題','Artists talk about an important cause.'],['beautiful','美麗的','The neighborhood became beautiful.'],['notice','注意到','People notice the big mural.'],['unique','獨特的','His art style is unique.'],['neighborhood','社區；鄰里','The neighborhood looks lively.'],['statement','宣言；表達','The painting makes a statement.'],['lively','有活力的','The park feels lively.'],['museum','博物館','Paintings can be in a museum.'],['nature','自然','Nature is beautiful.'],['weed','雜草','Mona Caron paints weeds.'],['colorful','色彩繽紛的','The wall is colorful.'],['wallpaper','壁紙','Play-Doh was used to clean wallpaper.'],['fireworks','煙火','Fireworks were discovered long ago.'],['popsicle','冰棒','A Popsicle melts in the sun.'],['slinky','彈簧玩具','The Slinky walks down steps.'],['Velcro','魔鬼氈','Velcro sticks things together.'],['Play-Doh','黏土玩具','Children play with Play-Doh.'],['bicycle','腳踏車','A bicycle has two wheels.'],['exchange','交換','Bicycle Exchange gives bikes to children.'],['village','村莊','Some children live in villages.'],['favorite','最喜歡的','Blue is my favorite color.'],['country','國家','Togo is a country in Africa.'],['walk','走路','Many children walk to school.'],['school','學校','Bikes help children get to school.'],['safety','安全','They teach bicycle safety.'],['fix','修理','Volunteers fix bikes.'],['old','舊的','Old bikes can be repaired.'],['broken','壞掉的','The broken bike needs repair.'],['throw away','丟掉','Do not throw away useful things.'],['group','團體','A group repairs bikes.'],['children','孩子們','Children need safe bikes.'],['rider','騎車的人','Bike riders can donate bikes.'],['useful','有用的','Accidental inventions can be useful.'],['creation','創作；創造物','An invention is a useful creation.'],['substitute','替代品','Play-Doh became a substitute toy.'],['firmly','牢固地','Velcro sticks firmly.'],['hook','鉤子','Burrs have tiny hooks.'],['loop','圈環','Velcro has hooks and loops.'],['burr','帶刺種子','Burrs inspired Velcro.'],['artist','藝術家','The artist painted a mural.'],['Brazilian','巴西的；巴西人','Alex Senna is Brazilian.'],['black-and-white','黑白的','He uses black-and-white paint.'],['support','支持','Art can support a cause.'],['climate','氣候','Art can support climate awareness.'],['awareness','意識','The mural raises awareness.'],['pollution','污染','Art can talk about pollution.'],['empty','空的','The wall was empty.'],['space','空間','Public art fills an empty space.'],['large','大的','She paints weeds very large.'],['goal','目標','Her goal is to help people notice nature.'],['detail','細節','Use details from the text.'],['conclusion','結論','Draw a conclusion from details.'],['question','問題','Good readers ask questions.'],['answer','答案','Write a complete answer.'],['before','在……之前','Ask questions before reading.'],['during','在……期間','Think during reading.'],['after','在……之後','Answer after reading.'],['compare','比較','Compare two inventions.'],['similar','相似的','The two ideas are similar.'],['different','不同的','Their uses are different.'],['main idea','主旨','Find the main idea.'],['author','作者','The author explains the problem.'],['text','文章','Read the text carefully.'],['strategy','策略','Use a reading strategy.']];
const GRAMMAR=[['Choose the correct sentence.',['I went home yesterday.','I goed home yesterday.','I going home yesterday.','I goes home yesterday.'],0],['Choose the correct contraction of do not.',['don\'t','doesn\'t','won\'t','couldn\'t'],0],['Choose the correct contraction of I have.',['I\'ve','I\'m','I\'ll','I\'d'],0],['Choose the words that make up won\'t.',['will not','would not','was not','were not'],0],['Choose the possessive pronoun.',['mine','my','me','I'],0],['Choose the possessive adjective.',['my','mine','me','I'],0],['Fill in: She speaks English ____.',['fluently','fluent','fluency','more fluent'],0],['Fill in: The dog barked ____.',['loudly','loud','louder','loudness'],0],['Choose the comparative adjective.',['more careful','most careful','carefully','carefulest'],0],['Choose the superlative adjective.',['the most wonderful','more wonderful','wonderfully','wonder'],0],['Choose the correct comma in a greeting.',['Dear Amy,','Dear, Amy','Dear Amy','Dear. Amy'],0],['Choose the correct compound sentence.',['Nina builds a garden, and she plants flowers.','Nina builds a garden and, she plants flowers.','Nina builds, a garden and she plants flowers.','Nina, builds a garden and she plants flowers.'],0],['Choose the adverb.',['carefully','careful','care','careless'],0],['Which word is a preposition?',['toward','quickly','beautiful','artist'],0],['Which sentence uses past tense correctly?',['They repaired the bike yesterday.','They repair the bike yesterday.','They repairing the bike.','They repairs the bike.'],0],['Choose the correct pronoun: Amy lost ___ book.',['her','hers','she','it'],0],['Choose the correct pronoun: This pencil is ____.',['mine','my','me','I'],0],['Choose the correct comparative adverb.',['more quietly','quiet','quietest','most quietly'],0],['Choose the correct plural.',['children','childs','childes','childrens'],0],['Choose the correct verb: He ____ a bike.',['rides','ride','riding','ridden'],0],['Choose the correct sentence.',['My sister sang more beautifully than Amanda did.','My sister sang beautifuler than Amanda did.','My sister sang most beautifully than Amanda did.','My sister sang more beautiful than Amanda did.'],0]];
const READING=[['What does Bicycle Exchange do with old bikes?',['It fixes them and gives them to children.','It throws them away.','It sells them for toys.','It paints them only.'],0],['Why do children need bicycle safety lessons?',['To learn how to ride safely.','To make bicycles expensive.','To learn how to paint.','To avoid school.'],0],['How do bikes help children in Togo?',['They help children get to school.','They become wall art.','They make toys.','They become fireworks.'],0],['Why is it a waste to throw away an old bicycle?',['Because it can be repaired and reused.','Because it is always new.','Because it cannot help anyone.','Because it is a painting.'],0],['How was the Popsicle invented?',['Frank Epperson left soda outside overnight.','A teacher painted a wall.','A bike rider donated it.','A scientist used Velcro.'],0],['What was Play-Doh first used for?',['Cleaning wallpaper.','Fixing bikes.','Painting weeds.','Making fireworks.'],0],['What invention was inspired by burrs?',['Velcro.','Popsicle.','Slinky.','Play-Doh.'],0],['Why are some inventions called accidental inventions?',['They were created by accident or mistake.','They were planned for many years.','They were painted on walls.','They were made only for museums.'],0],['Where is public art usually seen?',['In outdoor community spaces.','Only inside bedrooms.','Only in homework books.','Only in science labs.'],0],['Why do some artists create public art?',['To celebrate communities or talk about causes.','To hide their ideas.','To make walls empty.','To stop people from looking.'],0],['Who is Alex Senna?',['A Brazilian public artist.','A bicycle mechanic.','A scientist.','A school principal.'],0],['What makes Alex Senna art unique?',['He often uses black-and-white paint.','He only paints with blue.','He paints only bicycles.','He never paints people.'],0],['How has graffiti changed?',['It changed from simple words to colorful creative public art.','It became only a toy.','It disappeared completely.','It became a bicycle lesson.'],0],['Why might an artist paint on a public wall?',['So many people can see the art.','So nobody can see it.','So it can be thrown away.','So it becomes a worksheet.'],0],['What is Mona Caron main goal when painting weeds?',['To help people notice small parts of nature.','To sell bicycles.','To make fireworks.','To clean wallpaper.'],0],['What should a complete answer include?',['Important details from the text.','Only one random word.','No subject.','Only Chinese.'],0]];
let p={lv:1,hp:130,max:130,mp:50,maxmp:50,xp:0,next:120,gold:60,atk:28,bomb:3,hint:2,weapon:'Wood Sword',right:0,total:0,treasure:0,bossKill:0};let boss={name:'Slime',icon:'👾',hp:240,max:240};let cur=null;
function R(a,b){return Math.floor(Math.random()*(b-a+1))+a}function pick(a){return a[R(0,a.length-1)]}function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function make(q,ans,wrong){let c=shuffle([ans,...wrong].map(String));return{q,choices:c,answer:c.indexOf(String(ans))}}function wrong(arr,ans,idx){return shuffle(arr.map(x=>x[idx]).filter(x=>x!==ans)).slice(0,3)}
function genV(){let v=pick(VOCAB),t=R(1,3);if(t==1)return make('What does "'+v[0]+'" mean?',v[1],wrong(VOCAB,v[1],1));if(t==2)return make('Which word means: '+v[1]+' ?',v[0],wrong(VOCAB,v[0],0));return make('Fill in the blank: '+v[2].replace(v[0],'_____'),v[0],wrong(VOCAB,v[0],0))}function genObj(arr){let g=pick(arr);let ans=g[1][g[2]];let c=shuffle(g[1]);return{q:g[0],choices:c,answer:c.indexOf(ans)}}
function nextQ(){cur=pick([genV,()=>genObj(GRAMMAR),()=>genObj(READING)])();q.innerHTML=cur.q;answers.innerHTML=cur.choices.map((x,i)=>`<button class="ans" onclick="answer(${i})">${x}</button>`).join('')}function answer(i){p.total++;if(i==cur.answer){p.right++;let dmg=p.atk+R(0,12);boss.hp-=dmg;p.xp+=25;p.gold+=10;msg('✅ Correct! You dealt '+dmg+' damage.');if(Math.random()<.14)treasure();if(p.xp>=p.next)levelUp();if(boss.hp<=0)newBoss()}else{let d=18+Math.floor(p.lv/2);p.hp-=d;msg('❌ Wrong! Correct: '+cur.choices[cur.answer]);if(p.hp<=0){alert('Game Over! HP restored, but you lost 30 gold.');p.hp=p.max;p.gold=Math.max(0,p.gold-30)}}update();save();setTimeout(nextQ,550)}
function levelUp(){p.lv++;p.xp=0;p.next+=70;p.max+=18;p.maxmp+=8;p.hp=p.max;p.mp=p.maxmp;p.atk+=5;msg('🎉 Level Up!')}function newBoss(){p.bossKill++;p.gold+=80+p.lv*5;p.bomb++;let names=[['Goblin','👺'],['Dark Knight','🛡️'],['Ice Dragon','❄️🐉'],['Ancient Guardian','🏛️'],['Ultimate Grammar King','👑🐉']];let b=p.lv<5?names[0]:p.lv<10?names[1]:p.lv<15?names[2]:p.lv<20?names[3]:names[4];boss.name=b[0];boss.icon=b[1];boss.max=240+p.lv*70+p.bossKill*80;boss.hp=boss.max;msg('🏆 Boss defeated! New Boss: '+boss.name)}
function bomb(){if(p.bomb<=0)return msg('No bombs!');p.bomb--;boss.hp-=160+p.lv*8;boom();if(boss.hp<=0)newBoss();update();save()}function hint(){if(!cur)return;if(p.hint<=0)return msg('No hints!');p.hint--;let bs=[...document.querySelectorAll('.ans')];shuffle(bs.map((b,i)=>({b,i})).filter(x=>x.i!==cur.answer)).slice(0,2).forEach(x=>x.b.classList.add('hide'));update();save()}function healSpell(){if(p.mp<20)return msg('Not enough MP!');p.mp-=20;p.hp=Math.min(p.max,p.hp+50+p.lv*3);update();save()}function treasure(){p.treasure++;let r=R(1,5);if(r==1){p.gold+=60;msg('🎁 Treasure: +60G')}if(r==2){p.bomb++;msg('🎁 Treasure: +1 Bomb')}if(r==3){p.hint++;msg('🎁 Treasure: +1 Hint')}if(r==4){p.hp=p.max;msg('🎁 Treasure: Full HP')}if(r==5){p.mp=p.maxmp;msg('🎁 Treasure: Full MP')}update();save()}
function buy(t){if(t=='hp'&&p.gold>=25){p.gold-=25;p.hp=Math.min(p.max,p.hp+70)}else if(t=='bomb'&&p.gold>=35){p.gold-=35;p.bomb++}else if(t=='hint'&&p.gold>=45){p.gold-=45;p.hint++}else if(t=='mp'&&p.gold>=30){p.gold-=30;p.mp=p.maxmp}else return msg('Not enough gold!');update();save()}function equip(n,c,a){if(p.gold<c)return msg('Not enough gold!');p.gold-=c;p.weapon=n;p.atk+=a;msg('Equipped '+n);update();save()}function rank(){let r=p.total?Math.round(p.right/p.total*100):100;return r>=98?'SSS+':r>=95?'SSS':r>=90?'SS':r>=80?'S':r>=70?'A':'B'}function getAch(){let a=[];if(p.lv>=5)a.push('Word Master');if(p.lv>=10)a.push('Grammar Knight');if(p.lv>=15)a.push('Reading Hero');if(p.bossKill>=5)a.push('Boss Slayer');if(p.treasure>=5)a.push('Treasure Hunter');if(rank().startsWith('SSS'))a.push('SSS Legend');if(p.weapon=='Grammar Crown')a.push('Ultimate Grammar King');return a}function bg(){let u=['https://images.unsplash.com/photo-1441974231531-c6227db76b6e','https://images.unsplash.com/photo-1500530855697-b586d89ba3ee','https://images.unsplash.com/photo-1511497584788-876760111969','https://images.unsplash.com/photo-1524492449090-1abe1e76d1bd','https://images.unsplash.com/photo-1516912481808-3406841bd33c','https://images.unsplash.com/photo-1518709268805-4e9042af2176'];document.body.style.backgroundImage=`url(${u[Math.min(5,Math.floor(p.lv/5))]})`}function update(){let acc=p.total?Math.round(p.right/p.total*100):100;info.innerText=`Lv.${p.lv}｜${p.weapon}｜ATK ${p.atk}｜HP ${p.hp}/${p.max}｜MP ${p.mp}/${p.maxmp}｜Gold ${p.gold}｜💣${p.bomb}｜🎯${p.hint}｜Rank ${rank()}｜Acc ${acc}%`;hpbar.style.width=p.hp/p.max*100+'%';mpbar.style.width=p.mp/p.maxmp*100+'%';xpbar.style.width=p.xp/p.next*100+'%';bossbar.style.width=Math.max(0,boss.hp/boss.max*100)+'%';monster.innerText=boss.icon;bossName.innerText=boss.name+' HP '+boss.hp+'/'+boss.max;ach.innerHTML=getAch().map(x=>`<span class="badge">🏆 ${x}</span>`).join('')||'No achievements yet';bg()}function boom(){monster.classList.add('boom');setTimeout(()=>monster.classList.remove('boom'),450)}function msg(t){document.getElementById('msg').innerHTML=t}function save(){localStorage.setItem('rpg_v11_fusion_fixed',JSON.stringify({p,boss}))}function load(){let s=localStorage.getItem('rpg_v11_fusion_fixed');if(s){let d=JSON.parse(s);p=d.p;boss=d.boss;msg('Loaded!')};update()}function resetGame(){localStorage.removeItem('rpg_v11_fusion_fixed');location.reload()}load();update();
</script></body></html>
